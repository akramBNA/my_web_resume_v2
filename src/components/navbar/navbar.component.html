<nav class="navbar">

    <div class="logo">
        <a class="logo-placeholder">AB</a>
    </div>

    <div class="nav-links desktop">
        <a class="nav-item" (click)="scrollTo('about')">About</a>
        <a class="nav-item" (click)="scrollTo('services')">Services</a>
        <a class="nav-item" (click)="scrollTo('projects')">Projects</a>

    <div class="mobile-panel">

        <div class="mobile-header">
            <span>Menu</span>
            <button (click)="closeMenu()">✕</button>
        </div>

        <div class="mobile-links">
            <a class="mobile-item" (click)="scrollTo('about'); closeMenu()">About</a>
            <a class="mobile-item" (click)="scrollTo('services'); closeMenu()">Services</a>
            <a class="mobile-item" (click)="scrollTo('projects'); closeMenu()">Projects</a>
            <a class="mobile-item" (click)="scrollTo('contact'); closeMenu()">Contact</a>
            <a class="mobile-item" routerLink="/resume" (click)="closeMenu()">Resume</a>
        </div>

    </div>
