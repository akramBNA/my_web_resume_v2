<section class="about-section">

  <div class="about-container">

    <div class="about-left fade-in-left">
      <div class="avatar-wrapper">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=nerd-akram" alt="Akram Avatar" />
      </div>
    </div>

    <div class="about-right fade-in-right">

      <ng-container *ngIf="loading; else contentLoaded">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-subtitle"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
      </ng-container>

      <ng-template #contentLoaded>
        <h1 class="about-title">Akram Benaoun</h1>

        <h2 class="about-subtitle">
          <span class="typing-text">{{ typedText }}</span>
        </h2>

        <p class="about-description">
          A passionate Full-Stack Web & Mobile Applications Developer specializing
          in MERN & MEAN stacks. I design and build scalable, high-performance
          applications with clean architecture and exceptional user experiences.
        </p>

        <div class="about-buttons">
          <button class="fluent-btn primary" (click)="scrollTo('contact', false)">Hire Me</button> 
          <button class="fluent-btn outline" (click)="scrollTo('resume', true)">See Resume</button>
        </div>
      </ng-template>

    </div>

  </div>

</section>
