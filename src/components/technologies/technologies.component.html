<section id="technologies" class="technologies-section">

    <div class="technologies-container">

        <h2 class="section-title fade-in">Technologies</h2>

        <div class="group fade-up">
            <h3 class="group-title">Frontend</h3>
            <div class="tech-grid">
                <div class="tech-card" *ngFor="let tech of frontendTech">
                    <img [src]="tech.logo" [alt]="tech.name">
                    <div class="tooltip">{{ tech.name }}</div>
                </div>
            </div>
        </div>

        <div class="group fade-up">
            <h3 class="group-title">Backend</h3>
            <div class="tech-grid">
                <div class="tech-card" *ngFor="let tech of backendTech">
                    <img [src]="tech.logo" [alt]="tech.name">
                    <div class="tooltip">{{ tech.name }}</div>
                </div>
            </div>
        </div>

        <div class="group fade-up">
            <h3 class="group-title">Database</h3>
            <div class="tech-grid">
                <div class="tech-card" *ngFor="let tech of dbTech">
                    <img [src]="tech.logo" [alt]="tech.name">
                    <div class="tooltip">{{ tech.name }}</div>
                </div>
            </div>
        </div>

        <div class="group fade-up">
            <h3 class="group-title">Testing</h3>
            <div class="tech-grid">
                <div class="tech-card" *ngFor="let tech of testTech">
                    <img [src]="tech.logo" [alt]="tech.name">
                    <div class="tooltip">{{ tech.name }}</div>
                </div>
            </div>
        </div>

    </div>

</section>
